<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Floor</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Container Title */
.container h3 {
  text-align: center;
  margin-bottom: 20px;
  color: #333;
}

/* Input & Add Button */
.container input#floorName {
  padding: 8px;
  font-size: 14px;
  width: 100%;
  border: 1px solid #ccc;
  border-radius: 5px;
  margin-bottom: 10px;
}

.container button {
  padding: 8px 12px;
  font-size: 14px;
  width: 100%;
  margin-bottom: 20px;
  background-color: #007bff;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.container button:hover {
  background-color: #0056b3;
}

/* Grid Container for Floors */
#floorList {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
  list-style: none;
  padding: 0;
}

/* Each Floor Card */
#floorList li {
  background: #f9f9f9;
  border: 1px solid #ddd;
  padding: 15px;
  border-radius: 8px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  display: flex;
  flex-direction: column; /* Stack name and button vertically */
  justify-content: center;
  align-items: center;
  font-size: 15px;
  text-align: center;
}


/* Delete Button Inside Card */
#floorList .delete-btn {
  margin-top: 10px;
  background-color: #dc3545;
  padding: 6px 10px;
  font-size: 12px;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  transition: background-color 0.2s ease;
}

#floorList .delete-btn:hover {
  background-color: #c82333;
}


  </style>
  
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <h2>UNIVERSITY</h2>
    <ul>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="user.html" >User</a></li>
      <li><a href="#" class="active">Labs</a></li>
      <li><a href="items.html">Items</a></li>
      <li><a href="borrower.html">Borrower</a></li>
      <li><a href="inventory.html">Inventory</a></li>
      <li><a href="messages.html">Support</a></li>
       <li><a href="index.html">Sign Out</a></li>
    </ul>
  </div>

  <!-- Main Content -->
  <main id="main-content">
 <div class="container">
    <h3>Lab Floor Management</h3>
    <input type="text" id="floorName" placeholder="Enter floor name">
    <button onclick="addFloor()">Add Floor</button>
    <ul id="floorList"></ul>
  </div>
  <script src="script.js"></script>
   
</body>
</html>
